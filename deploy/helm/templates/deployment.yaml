apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chainforge.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chainforge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "chainforge.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chainforge.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: chainforge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--config", "/etc/chainforge/config.yaml"]
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chainforge.fullname" . }}-secrets
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "chainforge.fullname" . }}-secrets
                  key: OPENAI_API_KEY
          volumeMounts:
            - name: config
              mountPath: /etc/chainforge
              readOnly: true
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "chainforge.fullname" . }}-config
      terminationGracePeriodSeconds: 30
