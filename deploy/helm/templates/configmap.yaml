apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chainforge.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chainforge.labels" . | nindent 4 }}
data:
  config.yaml: |
    host: {{ .Values.config.host | quote }}
    port: {{ .Values.config.port }}
    provider:
      name: {{ .Values.config.provider.name | quote }}
      base_url: {{ .Values.config.provider.baseUrl | quote }}
    model: {{ .Values.config.model | quote }}
    log_level: {{ .Values.config.logLevel | quote }}
    log_format: {{ .Values.config.logFormat | quote }}
    otel_enabled: {{ .Values.config.otelEnabled }}
    otel_endpoint: {{ .Values.config.otelEndpoint | quote }}
    max_request_body_bytes: {{ .Values.config.maxRequestBodyBytes }}
