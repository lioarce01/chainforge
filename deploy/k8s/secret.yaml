# TEMPLATE — real values are NEVER committed to git.
# Apply with:
#   kubectl create secret generic chainforge-secrets \
#     --namespace=chainforge \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=OPENAI_API_KEY=sk-...
#
# Or with Helm:
#   helm install chainforge deploy/helm/ \
#     --set secrets.anthropicApiKey=sk-ant-... \
#     --set secrets.openaiApiKey=sk-...
apiVersion: v1
kind: Secret
metadata:
  name: chainforge-secrets
  namespace: chainforge
  labels:
    app.kubernetes.io/name: chainforge
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""   # fill at apply time — DO NOT commit real keys
  OPENAI_API_KEY: ""      # fill at apply time — DO NOT commit real keys
