apiVersion: v1
kind: ConfigMap
metadata:
  name: chainforge-config
  namespace: chainforge
  labels:
    app.kubernetes.io/name: chainforge
data:
  config.yaml: |
    host: "0.0.0.0"
    port: 8080
    provider:
      name: "anthropic"
    model: "claude-sonnet-4-6"
    log_level: "info"
    log_format: "json"
    otel_enabled: true
    otel_endpoint: "otel-collector:4317"
    max_request_body_bytes: 1048576
