apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chainforge
  namespace: chainforge
  labels:
    app.kubernetes.io/name: chainforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chainforge
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
